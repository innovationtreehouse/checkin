name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: checkmein_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Clean Install Dependencies
      run: npm ci
      env:
        HUSKY: "0"
      
    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Wait for Database
      run: |
        timeout 60s bash -c 'until nc -z 127.0.0.1 5432; do echo "Waiting for postgres..."; sleep 2; done'

    - name: Sync Database Schema
      run: |
        npx prisma db push --accept-data-loss > prisma_out.txt 2>&1 || (cat prisma_out.txt && exit 1)
      env:
        DATABASE_URL: postgresql://user:password@127.0.0.1:5432/checkmein_test?sslmode=disable

    - name: Run Tests
      run: npm run test
      env:
        DATABASE_URL: postgresql://user:password@127.0.0.1:5432/checkmein_test?sslmode=disable
        NEXTAUTH_SECRET: "test-secret-at-least-32-characters-long-so-it-passes"
        NEXTAUTH_URL: "http://localhost:4000"
        GOOGLE_CLIENT_ID: "dummy-id"
        GOOGLE_CLIENT_SECRET: "dummy-secret"
        NEXT_PUBLIC_DEV_AUTH: "true"
        BOOTSTRAP_SYSADMINS: "admin-audit-test@example.com"
