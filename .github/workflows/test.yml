name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: checkmein_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Clean Install Dependencies
      run: npm ci
      
    - name: Sync Database Schema
      run: npx prisma db push
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/checkmein_test

    - name: Run Tests
      run: npm run test
      env:
        DATABASE_URL: postgresql://user:password@localhost:5432/checkmein_test
        NEXTAUTH_SECRET: "test-secret"
        BOOTSTRAP_SYSADMINS: "admin@example.com"
